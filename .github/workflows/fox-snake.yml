name: Generate Fox Snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:        # allows manual "Run workflow" button
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate animation
        run: python3 generate_fox_snake.py --user e24x5-Fox --out fox-snake.gif

      - name: Commit result
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update fox-snake animation"
          file_pattern: fox-snake.gif
